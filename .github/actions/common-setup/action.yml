name: 'Common Setup'
description: 'Set up JDK and Gradle for CauldronTap builds'

inputs:
  java-version:
    description: 'Java version'
    required: true
    default: '25'

runs:
  using: 'composite'
  steps:
    - name: Grant execute permission for Gradle wrapper
      shell: bash
      run: chmod +x gradlew

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
